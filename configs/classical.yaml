model:
  name: ocsvm

features:
  mode: raw_depth
  fill_strategy: patch_mean
  pca_components: 64

training:
  per_category: true
  scaler: standard
  ocsvm_kernel: rbf
  ocsvm_nu: 0.05
  ocsvm_gamma: scale
  max_train_patches: 20000
  max_val_patches: 5000

inference:
  image_score: topk_mean
  topk_fraction: 0.05
  save_heatmaps: true
  max_heatmap_figures_per_category: 4
